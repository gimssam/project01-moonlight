<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="달빛 아래 김이 피어오르는 커피 한 잔과 쿠키 일러스트">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a3a"/>
      <stop offset="45%" stop-color="#8577b8"/>
      <stop offset="100%" stop-color="#ffb084"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6dd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff6dd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cupBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f5ead9"/>
    </linearGradient>
  </defs>

  <!-- 배경: 저녁에서 밤으로 이어지는 하늘 -->
  <rect width="800" height="1000" fill="url(#sky)"/>

  <!-- 달 -->
  <circle cx="575" cy="215" r="170" fill="url(#moonGlow)"/>
  <circle cx="575" cy="215" r="85" fill="#f6e2a8"/>
  <circle cx="613" cy="190" r="85" fill="url(#sky)"/>
  <circle cx="548" cy="188" r="16" fill="#fffaf0" opacity="0.35"/>

  <!-- 별 -->
  <circle cx="170" cy="130" r="6" fill="#fdf7ea" opacity="0.9"/>
  <circle cx="255" cy="225" r="4" fill="#fdf7ea" opacity="0.8"/>
  <circle cx="120" cy="255" r="4" fill="#fdf7ea" opacity="0.7"/>
  <circle cx="355" cy="110" r="3.5" fill="#fdf7ea" opacity="0.8"/>
  <circle cx="90" cy="180" r="3" fill="#fdf7ea" opacity="0.6"/>

  <!-- 김(스팀) -->
  <path d="M 350 555 q -22 -38 0 -76 q 22 -38 0 -76" fill="none" stroke="#fffaf0" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <path d="M 400 545 q 22 -38 0 -76 q -22 -38 0 -76" fill="none" stroke="#fffaf0" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <path d="M 450 555 q -22 -38 0 -76 q 22 -38 0 -76" fill="none" stroke="#fffaf0" stroke-width="10" stroke-linecap="round" opacity="0.5"/>

  <!-- 그림자 -->
  <ellipse cx="405" cy="838" rx="270" ry="30" fill="#0a0a0a" opacity="0.12"/>

  <!-- 받침(소서) -->
  <ellipse cx="400" cy="806" rx="205" ry="32" fill="#e7d8c5"/>
  <ellipse cx="400" cy="800" rx="205" ry="28" fill="#fffaf0"/>

  <!-- 컵 손잡이 -->
  <path d="M 522 610 q 92 8 92 88 q 0 80 -92 90" fill="none" stroke="#fffaf0" stroke-width="26" stroke-linecap="round"/>
  <path d="M 522 610 q 92 8 92 88 q 0 80 -92 90" fill="none" stroke="#f5ead9" stroke-width="10" stroke-linecap="round" opacity="0.6"/>

  <!-- 컵 몸통 -->
  <path d="M 268 600
           L 532 600
           L 502 758
           Q 496 800 400 800
           Q 304 800 298 758
           Z" fill="url(#cupBody)"/>
  <path d="M 268 600 L 532 600 L 524 640 L 276 640 Z" fill="#ffffff" opacity="0.5"/>

  <!-- 커피 표면 -->
  <ellipse cx="400" cy="604" rx="132" ry="22" fill="#4a3327"/>
  <ellipse cx="400" cy="600" rx="132" ry="18" fill="#6f4e39"/>
  <ellipse cx="355" cy="594" rx="30" ry="8" fill="#8a6449" opacity="0.6"/>

  <!-- 쿠키 -->
  <circle cx="628" cy="762" r="54" fill="#e8b94a"/>
  <circle cx="628" cy="762" r="54" fill="#ffffff" opacity="0.08"/>
  <circle cx="608" cy="745" r="7" fill="#5a4433"/>
  <circle cx="644" cy="750" r="6" fill="#5a4433"/>
  <circle cx="622" cy="778" r="6" fill="#5a4433"/>
  <circle cx="650" cy="782" r="5" fill="#5a4433"/>
  <circle cx="600" cy="775" r="4.5" fill="#5a4433"/>
</svg>
